<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çevrimdışı - Göz Takip Analizi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #030712;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: #f9fafb;
    }
    p {
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:active { background: #1e40af; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128065;</div>
    <h1>Bağlantı yok</h1>
    <p>
      Göz Takip Analizi uygulamasını kullanmak için internet bağlantısı gereklidir.
      Lütfen bağlantınızı kontrol edip tekrar deneyin.
    </p>
    <button class="btn" onclick="location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
